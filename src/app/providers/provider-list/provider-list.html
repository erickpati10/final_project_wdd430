<div class="row">
  <div class="col-xs-12">
    <div class="panel panel-default">
      <div class="panel-heading">
        <div class="row">
          <span class="title pad-left-right">Providers</span>
        </div>
        <div class="row">
          <div class="input-group pull-left pad-left-right col-xs-7">
            <input
              type="text"
              class="form-control"
              placeholder="Search by name, service type, or city"
              #searchBox
              (keyup)="search(searchBox.value)"
            />
            <div
              class="glyphicon glyphicon-search input-group-addon"
              (click)="search(searchBox.value)"
            ></div>
          </div>
          <div class="pull-right pad-left-right">
            <a class="btn btn-success" routerLink="/providers/new">Add Provider</a>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-xs-12">
          <table
            class="table table-striped table-bordered"
            *ngIf="filteredProviders && filteredProviders.length > 0; else noProviders"
          >
            <thead>
              <tr>
                <th>Name</th>
                <th>Service Type</th>
                <th>Location</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let provider of filteredProviders">
                <td>{{ provider.providerName }}</td>
                <td>{{ provider.serviceType }}</td>
                <td>{{ provider.city }}, {{ provider.state }}</td>
                <td>{{ provider.status }}</td>
                <td>
                  <a [routerLink]="['/providers', provider._id]" class="btn btn-info btn-xs"
                    >View</a
                  >
                  <a
                    [routerLink]="['/providers', provider._id, 'edit']"
                    class="btn btn-warning btn-xs"
                    >Edit</a
                  >
                  <button class="btn btn-danger btn-xs" (click)="deleteProvider(provider._id)">
                    Delete
                  </button>
                </td>
              </tr>
            </tbody>
          </table>

          <ng-template #noProviders>
            <p class="pad-left-right">No providers found.</p>
          </ng-template>
        </div>
      </div>
    </div>
  </div>
</div>
