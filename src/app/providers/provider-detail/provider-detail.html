<div class="panel panel-default">
  <div class="panel-heading">
    <h3 class="panel-title">{{ provider?.providerName }}</h3>
  </div>
  <div class="panel-body">
    <p><strong>Service Type:</strong> {{ provider?.serviceType }}</p>
    <p><strong>State:</strong> {{ provider?.state }}</p>
    <p><strong>City:</strong> {{ provider?.city }}</p>
    <p><strong>Phone:</strong> {{ provider?.phone }}</p>
    <p><strong>Email:</strong> {{ provider?.email }}</p>
    <p><strong>Status:</strong> {{ provider?.status }}</p>
    <p><strong>Notes:</strong> {{ provider?.notes }}</p>

    <a [routerLink]="['/providers', provider?._id, 'edit']" class="btn btn-primary">Edit</a>
    <a routerLink="/providers" class="btn btn-default">Back</a>
  </div>
</div>
